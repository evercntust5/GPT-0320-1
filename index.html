<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>SVVR 三層架構（分散 Hotspot + 大型閱讀面板）</title>
  <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
  <script src="https://unpkg.com/aframe-troika-text/dist/aframe-troika-text.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
  <style>
    #nameGate{
      position:fixed; inset:0;
      background:rgba(0,0,0,0.85);
      display:flex; align-items:center; justify-content:center;
      z-index:9999; padding:24px;
      font-family:'Noto Sans TC',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
      color:#fff;
    }
    #nameCard{
      width:min(460px,100%);
      background:rgba(20,20,20,0.92);
      border-radius:14px;
      padding:18px;
      box-shadow:0 10px 30px rgba(0,0,0,0.35);
    }
    #nameCard h2{ margin:0 0 10px; font-size:18px; }
    #nameCard p{ margin:0 0 12px; font-size:13px; opacity:.9; line-height:1.5; }
    #nameRow{ display:flex; gap:10px; }
    #studentNameInput{
      flex:1; font-size:16px; padding:10px 12px; border-radius:10px;
      border:1px solid rgba(255,255,255,0.22); background:rgba(255,255,255,0.08);
      color:#fff; outline:none;
    }
    #startBtn{
      font-size:16px; padding:10px 14px; border-radius:10px; border:0;
      background:#2f7cff; color:#fff; cursor:pointer; white-space:nowrap;
    }
    #hint{ margin-top:10px; font-size:12px; opacity:.75; }
    #aiOverlay{
      position:fixed; inset:0;
      background:rgba(0,0,0,0.58);
      display:none; align-items:center; justify-content:flex-end;
      z-index:9998; padding:20px 28px;
      font-family:'Noto Sans TC',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    }
    #aiCard{
      width:min(620px,92vw);
      max-height:min(82vh,780px);
      display:flex; flex-direction:column;
      background:rgba(18,18,18,0.96);
      border-radius:18px;
      overflow:hidden;
      box-shadow:0 14px 40px rgba(0,0,0,0.35);
      color:#fff;
    }
    #aiHeader{
      display:flex; align-items:center; justify-content:space-between;
      padding:14px 16px; background:#2f7cff;
    }
    #aiHeader h3{ margin:0; font-size:18px; }
    #aiCloseBtn{
      border:0; background:#fff; color:#111; cursor:pointer;
      border-radius:10px; padding:8px 12px; font-size:14px;
    }
    #aiMessages{
      flex:1; overflow:auto; padding:14px;
      background:rgba(255,255,255,0.03);
    }
    .ai-msg{ margin:0 0 12px; display:flex; }
    .ai-msg.user{ justify-content:flex-end; }
    .ai-msg .bubble{
      max-width:min(86%,560px); padding:10px 12px; border-radius:14px;
      line-height:1.6; font-size:14px; white-space:pre-wrap;
    }
    .ai-msg.user .bubble{ background:#2f7cff; color:#fff; }
    .ai-msg.assistant .bubble{ background:rgba(255,255,255,0.12); color:#fff; }
    #aiHint{
      padding:10px 14px; font-size:12px; line-height:1.5; opacity:.82;
      border-top:1px solid rgba(255,255,255,0.08);
    }
    #aiComposer{
      display:flex; gap:10px; padding:14px;
      border-top:1px solid rgba(255,255,255,0.08);
      background:rgba(0,0,0,0.18);
    }
    #aiInput{
      flex:1; min-height:92px; resize:vertical; border-radius:12px;
      border:1px solid rgba(255,255,255,0.18); background:rgba(255,255,255,0.06);
      color:#fff; padding:12px; font-size:15px; outline:none;
    }
    #aiSendBtn{
      align-self:flex-end; border:0; background:#2f7cff; color:#fff;
      border-radius:12px; padding:12px 16px; font-size:15px; cursor:pointer;
    }
    #aiSceneInputHost{
      position:fixed;
      left:8px; bottom:8px;
      width:2px; height:2px;
      overflow:hidden;
      opacity:.01; pointer-events:none;
      z-index:-1;
    }
    #aiSceneInput{
      width:2px; height:2px;
      opacity:.01;
      resize:none;
    }
  </style>
  <script>
    const STORAGE_KEY_NAME  = 'svvr_student_name_v1';
    const STORAGE_KEY_STATE = 'svvr_state_v1';
    const AI_ENDPOINT = '/api/ask'; // Vercel 後端 ask.js 預設路徑
    const TOPICS = {
      t1: {
        name: "Topic 1",
        hubPano: "#pano_t1_hub",
        objectives: [
          "了解 Topic 1 的學習目標（示範）",
          "能辨識 3 種代表性特徵（示範）"
        ],
        lessons: [
          { id: "t1_l1", name: "A", pano: "#pano_t1_l1", hotspotsGroup: "#hotspots-t1_l1", totalHotspots: 5 },
          { id: "t1_l2", name: "B", pano: "#pano_t1_l2", hotspotsGroup: "#hotspots-t1_l2", totalHotspots: 2 },
          { id: "t1_l3", name: "C", pano: "#pano_t1_l3", hotspotsGroup: "#hotspots-t1_l3", totalHotspots: 2 },
        ],
        quiz: {
          questions: [
            { q: "非洲菫、黃金葛分別屬於哪一科？", options: ["苦苣苔科、天南星科", "莧科、蘭雪花科", "堇菜科、茜草科"], answer: 0, explain: "正確答案：苦苣苔科、天南星科" },
            { q: "蘭科植物的主要特徵為何？", options: ["具雄、雌蕊合生而成的蕊柱", "花為肉穗花序", "花瓣為 4 的倍數"], answer: 0, explain: "正確答案：具雄、雌蕊合生而成的蕊柱" },
          ]
        }
      },
      t2: {
        name: "Topic 2",
        hubPano: "#pano_t2_hub",
        objectives: ["（示範）目標 1", "（示範）目標 2"],
        lessons: [
          { id: "t2_l1", name: "D", pano: "#pano_t2_l1", hotspotsGroup: "#hotspots-t2_l1", totalHotspots: 2 },
          { id: "t2_l2", name: "E", pano: "#pano_t2_l2", hotspotsGroup: "#hotspots-t2_l2", totalHotspots: 2 },
          { id: "t2_l3", name: "F", pano: "#pano_t2_l3", hotspotsGroup: "#hotspots-t2_l3", totalHotspots: 4 },
        ],
        quiz: {
          questions: [
            { q: "何種植物又稱重陽木？", options: ["相思樹", "茄苳", "苦楝"], answer: 1, explain: "第 1 題正確答案：茄苳" },
            { q: "下列何種植物屬於大喬木，不適合種植於混擬土花台中？", options: ["黃椰子", "緬梔", "榕樹"], answer: 2, explain: "第 2 題正確答案：榕樹" },
          ]
        }
      },
      t3: {
        name: "Topic 3",
        hubPano: "#pano_t3_hub",
        objectives: ["（示範）目標 1", "（示範）目標 2"],
        lessons: [
          { id: "t3_l1", name: "G", pano: "#pano_t3_l1", hotspotsGroup: "#hotspots-t3_l1", totalHotspots: 2 },
          { id: "t3_l2", name: "H", pano: "#pano_t3_l2", hotspotsGroup: "#hotspots-t3_l2", totalHotspots: 2 },
          { id: "t3_l3", name: "I", pano: "#pano_t3_l3", hotspotsGroup: "#hotspots-t3_l3", totalHotspots: 2 },
        ],
        quiz: {
          questions: [
            { q: "何種植物又稱七里香？", options: ["月橘", "洋繡球", "朱槿"], answer: 0, explain: "第 1 題正確答案：月橘" },
            { q: "何種植物又稱扶桑？", options: ["月橘", "洋繡球", "朱槿"], answer: 2, explain: "第 2 題正確答案：朱槿" },
          ]
        }
      }
    };
    let state = {
      version: 1,
      current: { level: "topicMenu", topicId: null, lessonId: null, enteredAt: null },
      progress: {},
      progressSeen: {},
      quiz: {},
      quizRuntime: null,
      logs: []
    };
    let hubProgressOpen = false;
    let aiListening = false;
    let aiRecognition = null;
    let aiMicGranted = false;
    let aiClosedUntil = 0;
    function ensureAiState(){
      state.ai ||= { messages: [] };
      if (!Array.isArray(state.ai.messages)) state.ai.messages = [];
    }
    function escapeHtml(str=''){
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }
    function compactText(str='', maxLen=120){
      const clean = String(str || '').replace(/\s+/g, ' ').trim();
      if (!clean) return '';
      return clean.length > maxLen ? `${clean.slice(0, maxLen - 1)}…` : clean;
    }
    function wrapAiDisplayText(str=''){
      return String(str || '')
        .replace(/\s*([。！？；])/g, '$1\n')
        .replace(/\n{2,}/g, '\n')
        .trim();
    }
    function isAiScenePanelOpen(){
      return !!qs('#aiScenePanel')?.getAttribute('visible');
    }
    function getActiveAiInput(){
      const sceneInput = document.getElementById('aiSceneInput');
      if (sceneInput && isAiScenePanelOpen()) return sceneInput;
      return document.getElementById('aiInput') || sceneInput;
    }
    function showAiInlineComposer(){
      openAiSceneTextEntry();
    }
    function hideAiInlineComposer(){}
    function focusAiSceneInput(){
      openAiSceneTextEntry();
    }
    function restoreVrUiFocus(){
      try {
        const scene = document.querySelector('a-scene');
        scene?.canvas?.focus?.();
        const cursorEl = document.querySelector('[cursor]');
        cursorEl?.components?.raycaster?.refreshObjects?.();
        scene?.renderer?.domElement?.focus?.();
        window.dispatchEvent(new Event('resize'));
      } catch(e) {}
    }
    function openAiSceneTextEntry(){
      const input = document.getElementById('aiSceneInput');
      if (!input) return;
      const current = input.value || '';
      let next = null;
      try {
        next = window.prompt('請輸入你想問 AI 助教的問題：', current);
      } catch(e) {
        next = null;
      }
      if (next === null) {
        setTimeout(restoreVrUiFocus, 80);
        return;
      }
      input.value = next;
      syncAiInputValue(next);
      renderAiSceneDraft();
      const trimmed = (next || '').trim();
      if (trimmed) {
        logEvent('ai_text_confirm', {
          topic_id: state?.current?.topicId || '',
          scene_id: state?.current?.lessonId || (state?.current?.topicId ? `${state.current.topicId}_hub` : 'topic_menu'),
          selected_option: trimmed
        });
        setAiStatus('已收到文字，正在送出給 AI…');
        setTimeout(() => { restoreVrUiFocus(); sendAiText(trimmed); }, 80);
      } else {
        setAiStatus('已清空輸入內容。');
        setTimeout(restoreVrUiFocus, 80);
      }
    }
    function renderAiSceneDraft(){
      const raw = (document.getElementById('aiSceneInput')?.value || '').trim();
      const hasText = !!raw;
      const promptText = hasText ? `待送出：${compactText(raw, 26)}` : '語音輸入：按確定後自動送出';
      setText('#aiSceneInputText', promptText);
      const bg = qs('#aiSceneInputBg');
      if (bg) bg.setAttribute('color', hasText ? '#1f2633' : '#151515');
    }
    function syncAiInputValue(value=''){
      const a = document.getElementById('aiInput');
      const b = document.getElementById('aiSceneInput');
      if (a) a.value = value;
      if (b) b.value = value;
      renderAiSceneDraft();
    }
    function renderAiMessages(){
      ensureAiState();
      const wrap = document.getElementById('aiMessages');
      if (wrap) {
        if (!state.ai.messages.length) {
          wrap.innerHTML = `<div class="ai-msg assistant"><div class="bubble">你好，我是 AI 助教。你可以在這裡輸入問題。
目前這個版本已把 AI 對話按鈕加回來；如果尚未串接 API，我會先顯示前端測試回覆。</div></div>`;
        } else {
          wrap.innerHTML = state.ai.messages.map(msg => {
            const role = msg.role === 'user' ? 'user' : 'assistant';
            return `<div class="ai-msg ${role}"><div class="bubble">${escapeHtml(msg.text || '')}</div></div>`;
          }).join('');
          wrap.scrollTop = wrap.scrollHeight;
        }
      }
      const voiceBtn = document.getElementById('aiVoiceBtn');
      if (voiceBtn) voiceBtn.classList.toggle('listening', !!aiListening);
      setText('#btnAiVoiceSceneLabel', aiListening ? '停止語音' : '語音輸入');
      const hint = document.getElementById('aiHint');
      const hintText = aiListening
        ? '語音辨識中…請直接說話。若環境太吵，可改用文字輸入。按 <b>Ctrl / Cmd + Enter</b> 可快速送出。'
        : '提示：此輸入框是噪音環境備用，也可按「語音輸入」。在部分手機 VR 全螢幕模式下若被系統隱藏，可先退出 VR 再輸入。按 <b>Ctrl / Cmd + Enter</b> 可快速送出。';
      if (hint) hint.innerHTML = hintText;
      renderAiScenePanel();
      renderAiSceneDraft();
    }
    function renderAiScenePanel(){
      const userTextEl = qs('#aiSceneUserText');
      const aiTextEl = qs('#aiSceneReplyText');
      if (!userTextEl || !aiTextEl) return;
      ensureAiState();
      const msgs = state.ai.messages || [];
      const lastUser = [...msgs].reverse().find(msg => msg.role === 'user');
      const lastAi = [...msgs].reverse().find(msg => msg.role === 'assistant');
      const userText = lastUser ? compactText(lastUser.text, 28) : '尚未提問';
      const aiText = lastAi ? wrapAiDisplayText(lastAi.text) : '你好，我是植物小幫手。\n可用下方按鈕提問。';
      const isAiError = /AI\s*request\s*failed|AI\s*服務目前沒有連上|沒有連上/i.test(aiText);
      const replyBg = qs('#aiSceneReplyBg');
      if (replyBg) replyBg.setAttribute('color', isAiError ? '#5a4a00' : '#161616');
      setText('#aiSceneUserText', userText);
      setText('#aiSceneReplyText', aiText);
      setAiStatus(aiListening ? '狀態：語音辨識中…' : '狀態：待命');
    }
    function setAiStatus(message='狀態：待命'){
      setText('#aiSceneStatus', message || '狀態：待命');
    }
    function openAiDialog(){
      if (Date.now() < aiClosedUntil) return;
      ensureAiState();
      const panel = qs('#aiScenePanel');
      if (!panel) return;
      placePanelInFront(panel, 1.42, -0.06);
      panel.setAttribute('visible', true);
      renderAiMessages();
      renderAiSceneDraft();
      if (state?.current?.lessonId) setLessonFocusMode(true);
      updateUiLock();
      logEvent('ai_open', {
        topic_id: state?.current?.topicId || '',
        scene_id: state?.current?.lessonId || (state?.current?.topicId ? `${state.current.topicId}_hub` : 'topic_menu')
      });
    }
    function closeAiDialog(){
      const panel = qs('#aiScenePanel');
      if (!panel || !panel.getAttribute('visible')) return;
      stopVoiceInput(false);
      aiClosedUntil = Date.now() + 1800;
      panel.setAttribute('visible', false);
      if (state?.current?.lessonId) setLessonFocusMode(false);
      updateUiLock();
      setTimeout(() => { aiClosedUntil = 0; }, 1850);
      logEvent('ai_close', {
        topic_id: state?.current?.topicId || '',
        scene_id: state?.current?.lessonId || (state?.current?.topicId ? `${state.current.topicId}_hub` : 'topic_menu')
      });
    }
    async function ensureMicPermission(){
      if (aiMicGranted) return true;
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) return true;
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        try { stream.getTracks().forEach(t => t.stop()); } catch(e) {}
        aiMicGranted = true;
        return true;
      } catch (err) {
        return false;
      }
    }
    async function startVoiceInput(){
      const input = getActiveAiInput();
      const micOk = await ensureMicPermission();
      if (!micOk) {
        syncAiInputValue('請先允許麥克風權限，才能使用語音輸入。');
        renderAiMessages();
        return;
      }
      const Ctor = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!Ctor) {
        syncAiInputValue('你的裝置目前不支援語音辨識，請改用文字輸入。');
        renderAiMessages();
        return;
      }
      if (aiListening) return;
      aiRecognition = new Ctor();
      aiRecognition.lang = 'zh-TW';
      aiRecognition.interimResults = true;
      aiRecognition.maxAlternatives = 1;
      aiRecognition.continuous = false;
      aiListening = true;
      renderAiMessages();
      logEvent('ai_voice_start', {
        topic_id: state?.current?.topicId || '',
        scene_id: state?.current?.lessonId || (state?.current?.topicId ? `${state.current.topicId}_hub` : 'topic_menu')
      });
      aiRecognition.onresult = (event) => {
        const transcript = Array.from(event.results).map(r => r[0]?.transcript || '').join('').trim();
        syncAiInputValue(transcript);
        renderAiMessages();
        if (event.results[event.results.length - 1]?.isFinal) {
          logEvent('ai_voice_result', {
            topic_id: state?.current?.topicId || '',
            scene_id: state?.current?.lessonId || (state?.current?.topicId ? `${state.current.topicId}_hub` : 'topic_menu'),
            selected_option: transcript
          });
          sendAiText(transcript);
        }
      };
      aiRecognition.onerror = () => {
        aiListening = false;
        renderAiMessages();
        if (!(getActiveAiInput()?.value || '').trim()) syncAiInputValue('語音辨識失敗，請再試一次或改用文字輸入。');
      };
      aiRecognition.onend = () => {
        aiListening = false;
        renderAiMessages();
      };
      try { aiRecognition.start(); } catch (e) {
        aiListening = false;
        renderAiMessages();
      }
    }
    function stopVoiceInput(render=true){
      if (aiRecognition) {
        try { aiRecognition.stop(); } catch (e) {}
      }
      aiListening = false;
      if (render) renderAiMessages();
    }
    async function sendAiText(text){
      ensureAiState();
      text = (text || '').trim();
      if (!text) return;
      const input = getActiveAiInput();
      if (input) input.value = '';
      state.ai.messages.push({ role:'user', text, ts: nowTs() });
      setAiStatus('狀態：AI 回應中…');
      renderAiMessages();
      saveState();
      logEvent('ai_question', {
        topic_id: state?.current?.topicId || '',
        scene_id: state?.current?.lessonId || (state?.current?.topicId ? `${state.current.topicId}_hub` : 'topic_menu'),
        selected_option: text
      });
      let reply = 'AI 服務目前沒有連上，請檢查 /api/ask 與 OPENAI_API_KEY 是否已正確設定。';
      if (AI_ENDPOINT) {
        try {
          const res = await fetch(AI_ENDPOINT, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              question: text,
              context: [
                state?.current?.topicId ? `topicId: ${state.current.topicId}` : '',
                state?.current?.lessonId ? `lessonId: ${state.current.lessonId}` : '',
                localStorage.getItem(STORAGE_KEY_NAME) ? `studentName: ${localStorage.getItem(STORAGE_KEY_NAME)}` : ''
              ].filter(Boolean).join(' | ')
            })
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok) throw new Error(data?.error || 'AI request failed');
          reply = data.answer || data.reply || data.message || reply;
        } catch (err) {
          reply = `AI 服務目前沒有連上：${err.message || '請檢查 API 設定'}`;
        }
      }
      state.ai.messages.push({ role:'assistant', text: reply, ts: nowTs() });
      logEvent('ai_reply', {
        topic_id: state?.current?.topicId || '',
        scene_id: state?.current?.lessonId || (state?.current?.topicId ? `${state.current.topicId}_hub` : 'topic_menu'),
        selected_option: reply
      });
      saveState();
      renderAiMessages();
    }
    async function sendAiMessage(){
      const input = getActiveAiInput();
      const text = (input?.value || '').trim();
      return sendAiText(text);
    }
    function saveState(){
      try { localStorage.setItem(STORAGE_KEY_STATE, JSON.stringify(state)); } catch(e){}
    }
    function loadState(){
      try {
        const raw = localStorage.getItem(STORAGE_KEY_STATE);
        if (!raw) return;
        const parsed = JSON.parse(raw);
        if (parsed && typeof parsed === 'object') state = parsed;
      } catch(e){}
    }
    function nowTs(){ return Date.now(); }
    function formatLocalTime(ts){
      const d = new Date(ts);
      const y = d.getFullYear();
      const m = String(d.getMonth()+1).padStart(2,'0');
      const day = String(d.getDate()).padStart(2,'0');
      const h = String(d.getHours()).padStart(2,'0');
      const min = String(d.getMinutes()).padStart(2,'0');
      const s = String(d.getSeconds()).padStart(2,'0');
      return `${y}-${m}-${day} ${h}:${min}:${s}`;
    }
    function currentSceneDuration(){
      const enteredAt = state?.current?.enteredAt;
      if (!enteredAt) return 0;
      return Math.max(0, Number(((Date.now() - enteredAt) / 1000).toFixed(1)));
    }
    function setCurrentScene(level, topicId=null, lessonId=null){
      state.current = { level, topicId, lessonId, enteredAt: nowTs() };
    }
    function buildLogEntry(type, extra={}){
      const topicId = extra.topic_id ?? extra.topicId ?? state?.current?.topicId ?? '';
      const sceneId = extra.scene_id ?? extra.sceneId ?? state?.current?.lessonId ?? (topicId ? `${topicId}_hub` : state?.current?.level || 'topic_menu');
      const entry = {
        time: formatLocalTime(nowTs()),
        topic_id: topicId || '',
        scene_id: sceneId || '',
        event_type: type || '',
        hotspot_id: extra.hotspot_id ?? extra.hotspotId ?? '',
        button_id: extra.button_id ?? extra.buttonId ?? '',
        question_id: extra.question_id ?? '',
        selected_option: extra.selected_option ?? '',
        correct_answer: extra.correct_answer ?? '',
        is_correct: extra.is_correct ?? '',
        duration_in_scene: extra.duration_in_scene ?? currentSceneDuration()
      };

    function faceCameraYaw(panelEl){
      const cam = qs('[camera]');
      if (!panelEl || !cam || !window.THREE) return;
      const panelPos = new THREE.Vector3();
      const camPos = new THREE.Vector3();
      panelEl.object3D.getWorldPosition(panelPos);
      cam.object3D.getWorldPosition(camPos);
      const dx = camPos.x - panelPos.x;
      const dz = camPos.z - panelPos.z;
      const yaw = Math.atan2(dx, dz) * (180 / Math.PI);
      panelEl.setAttribute('rotation', `0 ${yaw} 0`);
    }
    function placePanelInFront(panelEl, distance = 1.55, yOffset = -0.18){
      const cam = qs('[camera]');
      if (!panelEl || !cam || !cam.object3D || !window.THREE) return;
      const camPos = new THREE.Vector3();
      const camDir = new THREE.Vector3();
      cam.object3D.getWorldPosition(camPos);
      cam.object3D.getWorldDirection(camDir);
      camDir.y = 0;
      if (camDir.lengthSq() < 0.0001) camDir.set(0, 0, -1);
      camDir.normalize();
      const target = camPos.clone().add(camDir.multiplyScalar(distance));
      target.y = camPos.y + yOffset;
      panelEl.setAttribute('position', `${target.x.toFixed(3)} ${target.y.toFixed(3)} ${target.z.toFixed(3)}`);
      faceCameraYaw(panelEl);
    }
    function placePanelAtRight(panelEl, forward = 1.8, rightOffset = 1.0, yOffset = -0.05){
      const cam = qs('[camera]');
      if (!panelEl || !cam || !cam.object3D || !window.THREE) return;
      const camPos = new THREE.Vector3();
      const camDir = new THREE.Vector3();
      cam.object3D.getWorldPosition(camPos);
      cam.object3D.getWorldDirection(camDir);
      camDir.y = 0;
      if (camDir.lengthSq() < 0.0001) camDir.set(0, 0, -1);
      camDir.normalize();
      const right = new THREE.Vector3(camDir.z, 0, -camDir.x).normalize();
      const target = camPos.clone()
        .add(camDir.clone().multiplyScalar(forward))
        .add(right.multiplyScalar(rightOffset));
      target.y = camPos.y + yOffset;
      panelEl.setAttribute('position', `${target.x.toFixed(3)} ${target.y.toFixed(3)} ${target.z.toFixed(3)}`);
      faceCameraYaw(panelEl);
    }
    function updateProgressBar(fillSel, ratio, baseWidth = 1.88){
      const fill = qs(fillSel);
      if (!fill) return;
      const safeRatio = Math.max(0, Math.min(1, ratio || 0));
      const width = Math.max(0.001, Number((baseWidth * safeRatio).toFixed(4)));
      const centerX = Number((-baseWidth / 2 + width / 2).toFixed(4));
      fill.setAttribute('width', width);
      fill.setAttribute('position', `${centerX} -0.02 0.01`);
      fill.setAttribute('visible', safeRatio > 0);
    }

      schema: {

      },
      init: function(){

    function nextOrSubmitQuiz(){
      const rt = state.quizRuntime;
      if (!rt) return;
      const topic = TOPICS[rt.topicId];
      const total = topic.quiz.questions.length;
      if (rt.submitted){
        setText('#quizQuestion', '');
        setText('#quizResult', '');
        setVisible('#quizResult', false);
        hideQuizAnswerImage();
        setVisible('#pageQuiz', false);
        goHub(rt.topicId);
        return;
      }
      if (rt.chosen[rt.idx] === undefined) return;
      if (rt.idx < total-1){
        rt.idx += 1;
        saveState();
        renderQuizQuestion();
        return;
      }
      let score = 0;
      const details = topic.quiz.questions.map((q, i) => {
        const chosen = rt.chosen[i];
        const correct = (chosen === q.answer);
        if (correct) score += 1;
        return { chosen, correct, explain: q.explain };
      });
      state.quiz[rt.topicId] = {
        done: true,
        score,
        total,
        answers: rt.chosen.slice(),
        details,
        ts: nowTs()
      };
      saveState();
      topic.quiz.questions.forEach((q, i) => {
        const chosenIndex = rt.chosen[i];
        logEvent('quiz_submit', {
          topic_id: rt.topicId,
          scene_id: `${rt.topicId}_quiz`,
          question_id: `q${i+1}`,
          selected_option: q.options[chosenIndex] ?? '',
          correct_answer: q.options[q.answer] ?? q.answer,
          is_correct: chosenIndex === q.answer ? 'true' : 'false',
          duration_in_scene: Number((((nowTs() - (rt.startedAt || nowTs())) / 1000)).toFixed(1))
        });
      });
      setText('#quizQuestion', '');
      setVisible('#quizQuestion', false);
      setText('#quizResult', '');
      setVisible('#quizResult', false);
      for (let i=1;i<=3;i++){
        const btn = qs(`#quizOptBtn${i}`);
        const label = qs(`#quizOptText${i}`);
        if (btn) btn.setAttribute('visible', false);
        if (label) label.setAttribute('visible', false);
      }
      showQuizAnswerImage(rt.topicId);
      const nextBtn = qs('#quizNextBtn');
      if (nextBtn) {
        nextBtn.setAttribute('visible', true);
        nextBtn.setAttribute('src', '#btnimg-back');
      }
      rt.submitted = true;
      state.quizRuntime = rt;
      saveState();
    }
    function downloadLog(){
      try{
        const name = localStorage.getItem(STORAGE_KEY_NAME) || 'user';
        logEvent('download_log', {
          topic_id: state?.current?.topicId || '',
          scene_id: state?.current?.lessonId || (state?.current?.topicId ? `${state.current.topicId}_hub` : 'topic_menu')
        });
        const payload = JSON.stringify({ logs: state.logs, ai_messages: state.ai?.messages || [] }, null, 2);
        const blob = new Blob([payload], {type:'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `svvr_log_${name}.json`;
        document.body.appendChild(a);
        a.click();
        setTimeout(() => { try{ a.remove(); }catch(e){} }, 0);
        URL.revokeObjectURL(url);
      }catch(e){}
    }
    function bindAiSceneButtons(){
      document.querySelectorAll('[ui-action*="action: openAI"], #btnCloseAiScene, #btnAiTextScene, #btnAiVoiceScene, #aiSceneInputBg').forEach(el => {
        el.classList.add('clickable');
      });
    }
    AFRAME.registerComponent('ui-action', {
      schema: { action: {type:'string'}, a: {type:'string'}, b:{type:'string'} },
      init: function(){
        this.onClick = () => {
          const act = this.data.action;
          const buttonId = deriveButtonId(this.el, act, this.data.a, this.data.b);
          const closers = ['closeInfo','toggleProgress'];
          if (['closeAI','aiTextInput','aiVoiceInput'].includes(act) && !isEntityVisible('#aiScenePanel')) return;
          if (isAnyOverlayOpen()) {
            const overlay = activeOverlayType();
            if (!(overlay === 'progress' && act === 'toggleProgress') && !(overlay === 'info' && act === 'closeInfo') && !(overlay === 'ai' && ['closeAI','aiTextInput','aiVoiceInput'].includes(act))) {
              return;
            }
          }
          logEvent('button_click', {
            topic_id: state?.current?.topicId || this.data.a || '',
            scene_id: state?.current?.lessonId || (state?.current?.topicId ? `${state.current.topicId}_hub` : 'topic_menu'),
            button_id: buttonId
          });
          if (act === 'goTopicMenu') return goTopicMenu();
          if (act === 'goHub')       return goHub(this.data.a);
          if (act === 'goLesson')    return goLesson(this.data.a, this.data.b);
          if (act === 'startQuiz') {
            if (qs('#btnStartQuiz')?.getAttribute('data-enabled') !== 'true') return;
            return startQuiz(this.data.a);
          }
          if (act === 'chooseOpt')   return chooseOption(parseInt(this.data.a,10));
          if (act === 'prevQuiz')    return prevQuiz();
          if (act === 'nextQuiz')    return nextOrSubmitQuiz();
          if (act === 'closeInfo')   return closeInfoPanel();
          if (act === 'downloadLog') return downloadLog();
          if (act === 'toggleProgress') return toggleHubProgress();
          if (act === 'openAI') { if (Date.now() < aiClosedUntil) return; return openAiDialog(); }
          if (act === 'closeAI')        return closeAiDialog();
          if (act === 'aiTextInput') {
            focusAiSceneInput();
            return;
          }
          if (act === 'aiVoiceInput')   return aiListening ? stopVoiceInput() : startVoiceInput();
        };
        this.el.addEventListener('click', this.onClick);
      },
      remove: function(){
        this.el.removeEventListener('click', this.onClick);
      }
    });
    
    // =========================
    window.addEventListener('DOMContentLoaded', () => {
      loadState();
      const gate  = document.getElementById('nameGate');
      const input = document.getElementById('studentNameInput');
      const btn   = document.getElementById('startBtn');
      const savedName = localStorage.getItem(STORAGE_KEY_NAME) || '';
      gate.style.display = 'flex';
      if (input) input.value = savedName;
      setTimeout(() => input && input.focus(), 50);
      function start(){
        const name = (input?.value || '').trim();
        if (!name) { input && input.focus(); return; }
        localStorage.setItem(STORAGE_KEY_NAME, name);
        gate.style.display = 'none';
        goTopicMenu();
      }
      btn?.addEventListener('click', start);
      input?.addEventListener('keydown', (e) => { if (e.key === 'Enter') start(); });
      ensureAiState();
      renderAiMessages();
      bindAiSceneButtons();
      document.getElementById('aiCloseBtn')?.addEventListener('click', closeAiDialog);
      document.getElementById('aiVoiceBtn')?.addEventListener('click', () => {
        if (aiListening) stopVoiceInput();
        else startVoiceInput();
      });
      document.getElementById('aiInput')?.addEventListener('keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') sendAiMessage();
      });
      document.getElementById('aiSceneInput')?.addEventListener('input', renderAiSceneDraft);
      document.getElementById('aiSceneInput')?.addEventListener('focus', renderAiSceneDraft);
      document.getElementById('aiSceneInput')?.addEventListener('blur', renderAiSceneDraft);
      document.getElementById('aiSceneInput')?.addEventListener('keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') sendAiMessage();
      });
    });
  </script>
</head>
